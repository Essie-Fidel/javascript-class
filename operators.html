<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div>
        <p>Operators</p>
    </div>
    <script>
        let x = 5
        let y = "5"
        console.log(x == y)//true
        console.log(x === y)//false
        //assignment operator
        //+=
        let a = 10
        a += 5
        console.log(a)
        //-=
        let num1 = 8
        num1 -= 3
        console.log(num1)

    </script>
</body>

</html>
