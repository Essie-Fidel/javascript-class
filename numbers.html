<body>
    <p>
        Numerical Operations
    </p>
    <script>
        //Numerical operations/methods
        //(+) Addition
        //(-Subtraction
        // (*)Multiplication
        //(/)division
        //(**) exponential/power=>raised to power of
        //(++) increament=>one step forward/add by 1
        //(--) decrement=>one step behind/subtract by 1
        let y = 4
        let x = 2

        let s = y ** 2
        console.log(s)
        let number = 500
        number++
        number++
        console.log(number)
        number--
        number--
        console.log(number)
        //type coercion

        let a = 4
        let b = "5"
        let c = a + b
        console.log(c)
        let d = 4
        let e = "5"
        let f = d / e
        console.log(f)
        //type conversion/manual conversion
        let value = 5;

        let new_value = String(value);

        console.log(typeof (new_value));

        let num = "564"
        let num1 = Number(num)
        let num2 = parseInt(num)
        console.log(typeof (num1))
        console.log(typeof (num2))



    </script>
